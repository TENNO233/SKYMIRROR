name: CI – MLSecOps Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1 – Static Analysis (fast feedback, no API keys needed)
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install --quiet ruff mypy

      - name: Ruff lint
        run: ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: ruff format --check src/ tests/ scripts/

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2 – Offline Unit Tests (no live API calls)
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libraries (Pillow)
        run: sudo apt-get install -y --no-install-recommends libjpeg-dev libpng-dev

      - name: Install package + dev extras
        run: pip install --quiet -e ".[dev]"

      - name: Run tests
        env:
          # Stub keys so imports don't fail; live calls are mocked in tests
          OPENAI_API_KEY: "sk-test-00000000000000000000000000000000"
          PINECONE_API_KEY: "pcsk_test_000000"
          PINECONE_INDEX_NAME: "skymirror-rag"
          PINECONE_INDEX_HOST: "https://skymirror-rag.svc.pinecone.io"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            -x \
            --ignore=tests/test_rag_ingest.py \
            --ignore=tests/test_singapore_corpus.py \
            --ignore=tests/test_pinecone_retriever.py

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 3 – Offline Runtime Evaluation (MLSecOps release gate)
  # Checks: schema_valid_rate, guardrail_regression_rate, validator_regression,
  #         expert_routing, alert_evidence_completeness, report_generation
  # ─────────────────────────────────────────────────────────────────────────
  offline-eval:
    name: Offline MLSecOps Evaluation
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install --quiet -e ".[dev]"

      - name: Run offline evaluation
        env:
          OPENAI_API_KEY: "sk-test-00000000000000000000000000000000"
          PINECONE_API_KEY: "pcsk_test_000000"
          PINECONE_INDEX_NAME: "skymirror-rag"
          PINECONE_INDEX_HOST: "https://skymirror-rag.svc.pinecone.io"
        run: |
          python -m scripts.evaluate_runtime \
            --fixtures-dir tests/fixtures \
            --output eval_report.json
          echo "=== Evaluation Report ==="
          cat eval_report.json

      - name: Assert evaluation passed
        run: |
          python - <<'EOF'
          import json, sys
          with open("eval_report.json") as f:
              report = json.load(f)
          if not report.get("passed"):
              print("FAILED metrics:", report.get("failures"))
              sys.exit(1)
          print("All MLSecOps release gates passed:", report["metrics"])
          EOF

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlsecops-eval-report
          path: eval_report.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 4 – Governance Policy Integrity Check
  # Verifies policy.yaml and release_thresholds.yaml are well-formed
  # ─────────────────────────────────────────────────────────────────────────
  governance-check:
    name: Governance Policy Integrity
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install --quiet -e ".[dev]"

      - name: Validate governance policy
        run: |
          python - <<'EOF'
          from skymirror.tools.governance import (
              load_policy, load_release_thresholds,
              allowed_image_domains, allowed_rag_namespaces,
          )
          policy = load_policy()
          thresholds = load_release_thresholds()

          assert policy.get("version"), "Policy version must be set"
          assert policy.get("allowed_models"), "allowed_models must not be empty"
          assert allowed_image_domains(), "allowed_image_domains must not be empty"
          assert allowed_rag_namespaces(), "allowed_rag_namespaces must not be empty"

          t = thresholds.get("thresholds", {})
          assert t.get("schema_valid_rate") == 1.0, "schema_valid_rate must be 1.0"
          assert t.get("guardrail_regression_rate") == 0.0, "guardrail_regression_rate must be 0.0"

          print("Governance policy valid:", policy["version"])
          print("Release thresholds valid:", thresholds["version"])
          EOF

      - name: Detect policy version drift
        run: |
          python - <<'EOF'
          # Ensure policy.yaml and release_thresholds.yaml share the same version
          from skymirror.tools.governance import load_policy, load_release_thresholds
          p_ver = load_policy()["version"]
          t_ver = load_release_thresholds()["version"]
          assert p_ver == t_ver, f"Version mismatch: policy={p_ver}, thresholds={t_ver}"
          print(f"Policy versions aligned: {p_ver}")
          EOF

  # ─────────────────────────────────────────────────────────────────────────
  # Final gate – all stages must pass before merge is allowed
  # ─────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate (required)
    runs-on: ubuntu-latest
    needs: [unit-tests, offline-eval, governance-check]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.offline-eval.result }}" != "success" || \
                "${{ needs.governance-check.result }}" != "success" ]]; then
            echo "One or more MLSecOps gates failed."
            exit 1
          fi
          echo "All MLSecOps CI gates passed."
